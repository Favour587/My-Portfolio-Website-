<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Favour</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

    <nav class="navbar dark-nav">
        <div class="logo">Favour Udoma.</div>
        <ul class="about-nav-links">
            <li><a href="Index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="contact-wrapper">

        <div class="profile-image">
            <img src="fav.jpeg" alt="Favour">
        </div>

<div class="contact-content">

        <div class="contact-header">
            <h1>Reach out to me</h1>
            <p>Have a project in mind? get in touch.</p>
        </div>

        <form class="contact-form">
            <div class="input-group">
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <textarea placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
            
</div>
        </form>
    </section>

<footer class="footer">
     <div class="footer-content">
        
        <div class="footer-logo">
            <h2>Favour Udoma.</h2>
            <p>Build and design clean and simple websites.</p>
        </div>

        
        <div class="footer-links-group">
            <h3>Explore</h3>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>

       
        <div class="footer-socials">
            <h3>Contact</h3>
            <div class="social-icons">
                <a href="https://github.com/Favour587"> GitHub</a>
                <a href="#"> LinkedIn</a>
                <a href="https://www.instagram.com/sheisyourfavouritegirl/"> Instagram</a>
            </div>
        </div>
    </div>

</body>
</html>
